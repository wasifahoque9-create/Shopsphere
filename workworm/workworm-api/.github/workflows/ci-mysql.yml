name: CI (MySQL)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, xml, json, pdo_mysql
          coverage: none

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot && break || sleep 2
          done

      - name: Install composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare .env
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', str_replace(['DB_CONNECTION=sqlite','DB_DATABASE=laravel','DB_HOST=127.0.0.1'], ['DB_CONNECTION=mysql','DB_DATABASE=testing','DB_HOST=127.0.0.1'], file_get_contents('.env')));"

      - name: Wait for DB ready
        run: |
          for i in {1..30}; do
            php -r "try{new PDO('mysql:host=127.0.0.1;port=3306;dbname=testing','root','root'); echo 'ok'; exit(0);}catch(Exception $e){sleep(2);}"
          done

      - name: Generate app key & migrate
        run: |
          php artisan key:generate --ansi
          php artisan migrate --force --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit --colors=always
